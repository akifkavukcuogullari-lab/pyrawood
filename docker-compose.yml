services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pyrawood
      POSTGRES_USER: pyrawood
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pyrawood_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No ports exposed — only accessible by backend via Docker network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pyrawood"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://pyrawood:${DB_PASSWORD:-pyrawood_secret}@db:5432/pyrawood
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-pyra-wood-jwt}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      FRONTEND_URL: ${FRONTEND_URL:-http://129.212.133.64:8080}
      PORT: "3001"
      NODE_ENV: production
      RUN_MIGRATIONS: "true"
      RUN_SEEDS: "true"
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - uploads:/app/uploads

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://129.212.133.64:8080/api}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://129.212.133.64:8080/api}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-pk_test_placeholder}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://129.212.133.64:8080}
      NEXT_PUBLIC_SITE_NAME: Pyra Wood
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  pgdata:
  uploads:
